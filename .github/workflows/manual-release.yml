name: Manual release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA / branch / existing tag to build from"
        required: true
      tag:
        description: "New tag name (leave empty to use existing tag in ref)"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.vars.outputs.TAG }}
      CREATE_TAG: ${{ steps.vars.outputs.CREATE_TAG }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: "14.04"
            image: "ubuntu:14.04"
            infix: "openssl1.0"
            cxxflags: "-std=c++11"
          - ubuntu: "18.04"
            image: "ubuntu:18.04"
            infix: "openssl1.1"
            cxxflags: "-std=c++11"
          - ubuntu: "24.04"
            image: "ubuntu:24.04"
            infix: "openssl3"
            cxxflags: ""

    steps:
      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Decide tag name
        id: vars
        run: |
          REF=${{ inputs.ref }}
          if [ -n "${{ inputs.tag }}" ]; then
            TAG=${{ inputs.tag }}
          else
            if echo "$REF" | grep -Eq '^[0-9a-f]{40}$'; then # length=40, commit hash
              SHORTREF="$(printf '%s' "$REF" | cut -c1-7)"
              TAG="commit-${SHORTREF}"
            else
              TAG="$REF"
              echo "CREATE_TAG=no" >> "$GITHUB_OUTPUT"
            fi
            if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              TAG_COMMIT="$(git rev-list -n 1 "$TAG")"
              REF_COMMIT="$(git rev-parse "$REF")"
              if [ "$TAG_COMMIT" = "$REF_COMMIT" ]; then
                echo "CREATE_TAG=no" >> "$GITHUB_OUTPUT"
              else
                echo "ERROR: '$TAG' already exists but points to $TAG_COMMIT, not $REF_COMMIT" >&2
                exit 1
              fi
            fi
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
      - name: Setup Zig
        uses: Rul1an/zig-cross-compile-action@v1
        with:
          version: 0.12.0
          target: x86_64-linux-gnu.2.3
      - name: Setup build deps (host)
        run: |
          git clone https://github.com/ge9/zig-gcc-wrapper "$RUNNER_TEMP/zig-gcc-wrapper"

      - name: Build on Ubuntu ${{ matrix.ubuntu }}
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -v "$(dirname "$(which zig)"):/opt/zig" \
            -v "$RUNNER_TEMP/zig-gcc-wrapper:/opt/zig-gcc-wrapper" \
            -w /src \
            ${{ matrix.image }} \
            bash -euxc '
              export PATH=/opt/zig:/opt/zig-gcc-wrapper:$PATH
              apt update
              apt install -y build-essential libssl-dev libboost-dev
              make clean
              CXXFLAGS="${{ matrix.cxxflags }}" zigmake 2.4
              tar czvf stunserver-${{ steps.vars.outputs.TAG }}-${{ matrix.infix }}.tar.gz \
                stunserver stunclient stuntestcode
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.ubuntu }}
          path: stunserver-${{ steps.vars.outputs.TAG }}-${{ matrix.infix }}.tar.gz
          retention-days: 1
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create and push tag
        if: needs.build.outputs.CREATE_TAG != 'no'
        run: |
          git tag "${{ needs.build.outputs.TAG }}"
          git push origin "${{ needs.build.outputs.TAG }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.TAG }}
          name: Release ${{ needs.build.outputs.TAG }}
          files: dist/**/*
